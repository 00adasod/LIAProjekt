name: Build and deploy fullstack to Azure V4

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Bygg backend
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Backend with Maven
        working-directory: Backend
        run: mvn clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: Backend/target/*.jar

  # Bygg frontend
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm install

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      - name: Verify build output
        run: ls -R Frontend/dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: Frontend/dist

  # Deploy backend till Azure Web App API
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy Backend to Azure API
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-dev-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: backend/*.jar

  # Deploy frontend till Azure Web App
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-dev-web
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: frontend

  # Ställ in Azure Web App för korrekt hantering av SPA (Single Page App)
  configure-frontend:
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Create web.config for SPA routing
        run: |
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > Frontend/dist/web.config
          echo "<configuration>" >> Frontend/dist/web.config
          echo "  <system.webServer>" >> Frontend/dist/web.config
          echo "    <rewrite>" >> Frontend/dist/web.config
          echo "      <rules>" >> Frontend/dist/web.config
          echo "        <rule name=\"React SPA\" stopProcessing=\"true\">" >> Frontend/dist/web.config
          echo "          <match url=\"^(?!api).*$\" />" >> Frontend/dist/web.config
          echo "          <action type=\"Rewrite\" url=\"/index.html\" />" >> Frontend/dist/web.config
          echo "        </rule>" >> Frontend/dist/web.config
          echo "      </rules>" >> Frontend/dist/web.config
          echo "    </rewrite>" >> Frontend/dist/web.config
          echo "  </system.webServer>" >> Frontend/dist/web.config
          echo "</configuration>" >> Frontend/dist/web.config

      - name: Deploy web.config to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-dev-web
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: Frontend/dist/web.config