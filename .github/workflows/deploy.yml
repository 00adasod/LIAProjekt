name: Build and Deploy Frontend to Azure

on:
  push:
    branches:
      - main  # Kör denna pipeline varje gång du pushar till main-branchen

jobs:
  build-frontend:
    runs-on: ubuntu-latest  # Kör på den senaste versionen av Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Hämtar koden från GitHub-repot

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Sätt rätt Node.js-version för ditt projekt

      - name: Install frontend dependencies
        working-directory: Frontend  # Gå till Frontend-mappen
        run: npm install  # Installera alla Node.js-beroenden

      - name: Build frontend with Vite
        working-directory: Frontend  # Gå till Frontend-mappen
        run: npm run build  # Kör byggkommandot för Vite (detta skapar dist/ mappen)

      - name: Verify build output
        run: ls -R Frontend/dist  # Verifiera att alla byggda filer finns i dist/ mappen

      - name: Create frontend zip file
        run: |
          cd Frontend
          zip -r frontend.zip dist/*  # Skapa en ZIP-fil med alla filer från dist/ (inkl. web.config)

      - name: Upload frontend artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: Frontend/frontend.zip  # Ladda upp ZIP-filen som en artifact för senare användning

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend  # Denna jobbar efter build-frontend jobbet

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend  # Ladda ner den uppladdade artifacten (frontend.zip)

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-dev-web  # Ditt app-namn på Azure Web App
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}  # Din Azure Publish Profile (lägg till som en secret)
          package: frontend/frontend.zip  # Ladda upp ZIP-filen med dist/ och web.config
          slot-name: production  # Om du använder en slot, annars ta bort detta fält