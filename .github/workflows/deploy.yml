name: Deploy to Azure

on:
  push:
    branches:
      - main  # Eller den branch du vill använda för deployment

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Java JDK (version 21)
        uses: actions/setup-java@v2
        with:
          java-version: '21'  # Välj Java 21 SE för backend
          distribution: 'temurin'  # Sätt distributionen till Eclipse Temurin

      - name: Build backend with Maven
        run: mvn clean install --file Backend/pom.xml

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-dev-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend  # Vänta på att backend ska vara distribuerad innan frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js (version 20 LTS)
        uses: actions/setup-node@v2
        with:
          node-version: '20'  # Välj Node.js 20 LTS för frontend

      - name: Install dependencies
        run: |
          cd Frontend
          npm install

      - name: Build frontend with Vite
        run: |
          cd Frontend
          npm run build

      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-dev-web
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}